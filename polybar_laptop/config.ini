; Theme
; [global/wm]
; include-file = ~/.config/polybar/mocha.ini

; Default Colours
[colors]
background = #aa000000
foreground = #ABB2BF
muted = #585858
urgent = #E06C75
primary = #61AFEF

; background = #282A2E
; background-alt = #373B41
; foreground = #C5C8C6
; primary = #F0C674
; secondary = #8ABEB7
; alert = #A54242
; disabled = #707880

[bar/mybar]
width = 100%
height = 20pt
; offset-x = 20
offset-y = 20
; radius = 6
background = ${colors.base}
border-color = ${colors.crust}
border-size = 1pt
alert = #A54242
font-0 = JetBrainsMonoNerdFont-Regular:size=10;2
foreground = ${colors.green}

radius-top-left = 5.0
radius-top-right = 5.0
radius-bottom-left = 5.0
radius-bottom-right = 5.0

; dpi = 96

; background = ${colors.background}
; foreground = ${colors.foreground}

line-size = 3pt

padding-left = 1
padding-right = 1

module-margin = 1

separator = |
; separator-foreground = ${colors.disabled}

modules-left = xworkspaces xwindow
# modules-right = pulseaudio memory cpu wlan eth date
modules-right = pulseaudio memory cpu wlan date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray
format-margin = 8pt
tray-spacing = 16pt

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} disconnected

[module/wlan]
interface = wlp2s0
inherit = network-base
interface-type = wireless
label-connected = Wireless Connected
; label-connected = %{F#F0C674}%ifname%%{F-} %essid% %local_ip%

[module/eth]
interface = eno1
inherit = network-base
interface-type = wired
label-connected = Ethernet Connected 
; label-connected = %{F#F0C674}%ifname%%{F-} %local_ip%

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

; [module/battery]
; type = internal/battery
; full-at = 100
; low-at = 30
; battery = BAT0
; adapter = AC
; poll-interval = 5
; format-charging = <label-charging>
; format-discharging = <label-discharging>
 
; [module/battery-alt]
; type=external/script
; exec=acpi | cut -d ' ' -f 4 |grep -E "*%" 2>/dev/null
; interval=30
; tail=true

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
