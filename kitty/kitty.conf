# BEGIN_KITTY_THEME
# One Half Dark
include current-theme.conf
# END_KITTY_THEME

# General

# copy on select ( same as Windows Terminal )
copy_on_select yes

# Appearance

# opacity
background_opacity 0.8
# background blur
background_blur 5

# Font Customisation

# font family
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
# font size
font_size 10.0
# ligatures ( let's test out ligatures )
disable_ligatures never
# undercurl style
undercurl_style thin-dense

# URL Customisation

# detect URLs under mouse cursor
detect_urls yes

# URL font colour
url_color #0087bd
# URL style
url_style curly

# Hyperlinks Customisation

# Same as URL style settings
underline_hyperlinks hover

# Caret Customisation

# caret shape ( focused )
shell_integration no-cursor
cursor_shape block
# caret shape ( unfocused )
cursor_shape_unfocused hollow
# caret blinking ( disable = 0 | system default = -1 )
cursor_blink_interval 0
# caret colour
cursor #98c379

# Mouse Customisation

# mouse cursor hide ( immediately hide = -1 | disable = -1 )
mouse_hide_wait -1

# For Configuration Reload
allow_remote_control yes
